spring.application.name=driveflow-backend

# Servidor y Activación de Hilos Virtuales 
server.port=8080
spring.threads.virtual.enabled=true

# Conexión a la Base de Datos MySQL (XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3306/driveflow_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA y visualización limpia de consultas en la consola de VSC
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Habilitar la inicialización asíncrona de datos desde data.sql 
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

spring.mail.host=smtp.gmail.com
spring.mail.port=587

# Credenciales reales para autenticar con Google
spring.mail.username=MAIL_APLICACIONES
spring.mail.password=PASSWORD_APLICACIONES

# Bloque de seguridad SSL
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

