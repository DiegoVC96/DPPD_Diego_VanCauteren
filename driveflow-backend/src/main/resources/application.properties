# Nombre de la Aplicación
spring.application.name=driveflow-backend

# Servidor y Activación de Hilos Virtuales 
server.port=8080
spring.threads.virtual.enabled=true

# Conexión a la Base de Datos MySQL (XAMPP)
spring.datasource.url=jdbc:mysql://localhost:3306/driveflow_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA y visualización limpia de consultas en la consola de VSC
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
